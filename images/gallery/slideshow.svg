<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1600 900" width="100%" height="100%">

  <style>
    /* 7 images × 3s each = 21s total. Fade 0.5s in/out. */
    image {
      opacity: 0;
      animation: slide-fade 21s infinite;
    }
    image:nth-child(1) { animation-delay:  0s; }
    image:nth-child(2) { animation-delay:  3s; }
    image:nth-child(3) { animation-delay:  6s; }
    image:nth-child(4) { animation-delay:  9s; }
    image:nth-child(5) { animation-delay: 12s; }
    image:nth-child(6) { animation-delay: 15s; }
    image:nth-child(7) { animation-delay: 18s; }

    @keyframes slide-fade {
      0%      { opacity: 0; }
      2.38%   { opacity: 1; }  /* 0.5s fade in  */
      11.9%   { opacity: 1; }  /* hold until 2.5s */
      14.28%  { opacity: 0; }  /* 0.5s fade out → 3s */
      100%    { opacity: 0; }  /* hidden for remaining 18s */
    }
  </style>

  <image href="../portfolio/brand/cubacel-tur/1-cubacel-tur-big.svg"
         x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid meet"/>

  <image href="../portfolio/brand/king-woodworker/logo-animated.svg"
         x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid meet"/>

  <image href="../portfolio/brand/tete-by-doublete/logotype.svg"
         x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid meet"/>

  <image href="../portfolio/brand/savia/icon-logotype-horizontal.svg"
         x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid meet"/>

  <image href="../portfolio/brand/nuestra-america-podcast/podcast-animation.svg"
         x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid meet"/>

  <image href="../portfolio/brand/la-bella-vida/monogram.svg"
         x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid meet"/>

  <image href="../portfolio/brand/dropless/dropless-logo-animated.svg"
         x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid meet"/>

</svg>
